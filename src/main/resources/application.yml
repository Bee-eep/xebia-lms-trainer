spring:
  application:
    name: lms-trainer

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

server:
  port: 8080

aws:
  s3:
    region: ${AWS_S3_REGION:us-east-1}
    bucket: ${AWS_S3_BUCKET:lms-trainer-media}
    presign-ttl-minutes: ${AWS_S3_PRESIGN_TTL_MINUTES:15}
