spring:
  application:
    name: lms-trainer

  datasource:
    url: jdbc:h2:file:./data/lms_trainer;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

server:
  port: 8080

aws:
  s3:
    region: ${AWS_S3_REGION:us-east-1}
    bucket: ${AWS_S3_BUCKET:lms-trainer-media}
    presign-ttl-minutes: ${AWS_S3_PRESIGN_TTL_MINUTES:15}
