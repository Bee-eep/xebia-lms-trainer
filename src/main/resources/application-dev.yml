# Development profile — uses embedded H2 with PostgreSQL compatibility mode.
# Activate with: --spring.profiles.active=dev (or SPRING_PROFILES_ACTIVE=dev)
spring:
  datasource:
    url: jdbc:h2:file:./data/lms_trainer;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
